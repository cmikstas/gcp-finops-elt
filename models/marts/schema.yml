version: 2

models:
  - name: fct_server_metrics
    description: "Final server metrics model ready for Grafana and Looker"
    columns:
      - name: timestamp
        description: "Parsed timestamp of the metric"
        tests:
          - not_null
      - name: server_id
        description: "Unique identifier for the server"
        tests:
          - not_null
      - name: metric_date
        description: "Date extracted from timestamp for partitioning"
        tests:
          - not_null

  - name: fct_cur
    description: "Final CUR billing model with service categorization"
    columns:
      - name: usage_start_date
        tests:
          - not_null
      - name: usage_account_id
        tests:
          - not_null
      - name: cost
        tests:
          - not_null
      - name: service_category
        tests:
          - not_null

  - name: dim_account_map
    description: "Account dimension table with ownership and environment metadata"
    columns:
      - name: account_id
        description: "Unique AWS account identifier"
        tests:
          - not_null
          - unique
      - name: account_name
        description: "Human readable account name"
        tests:
          - not_null
      - name: business_unit
        description: "Business unit that owns the account"
        tests:
          - not_null
      - name: environment
        description: "Account environment type"
        tests:
          - not_null
      - name: is_production
        description: "Boolean flag indicating if this is a production account"
        tests:
          - not_null