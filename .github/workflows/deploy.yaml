name: Deploy to Cloud Run and Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'pipeline/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/282981154722/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: github-actions-deploy@cur-sql-practice.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west3-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t us-west3-docker.pkg.dev/cur-sql-practice/cloud-run-source-deploy/finops-beam-pipeline:${{ github.sha }} ./pipeline
          docker push us-west3-docker.pkg.dev/cur-sql-practice/cloud-run-source-deploy/finops-beam-pipeline:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy finops-beam-pipeline \
            --image us-west3-docker.pkg.dev/cur-sql-practice/cloud-run-source-deploy/finops-beam-pipeline:${{ github.sha }} \
            --region us-west3 \
            --platform managed

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ steps.auth.outputs.credentials_json }}
          projectId: cur-sql-practice
          channelId: live